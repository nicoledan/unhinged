<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Unhinged Zine</title>
    <meta property="og:title" content="Unhinged Zine" />

    <meta property="og:description" content="A zine about online dating" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="https://raw.githubusercontent.com/nicoledan/unhinged/main/favicon.png" type="image/png" />
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            background: #000;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100%;
            width: 100%;
        }

        #sparkle-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        #wrapper {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            width: 100%;
            overflow-y: auto;
        }

        #zine-title {
            font-family: 'Lora', serif;
            font-size: 26px;
            font-weight: 600;
            color: #fff;
            text-align: center;
            padding: 20px 16px 6px;
            letter-spacing: 0.3px;
            flex-shrink: 0;
        }

        #zine-subtitle {
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            color: rgba(255,255,255,0.6);
            text-align: center;
            padding: 0 16px 14px;
            flex-shrink: 0;
        }

        #zine-container {
            flex: 1;
            position: relative;
            width: 100%;
            overflow: hidden;
            margin: 10px 0;
            min-height: 420px;
        }

        @media (min-width: 601px) {
            #zine-container {
                min-height: 600px;
                max-width: 600px;
            }
        }

        @media (max-width: 600px) {
            #zine-container {
                padding: 0 16px;
                margin: 10px 0;
            }
            #zine-subtitle {
                padding: 0 16px 4px;
            }
            #subscribe-bar {
                padding: 4px 16px 10px;
                align-items: center;
            }
        }

        #loading {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: rgba(255,255,255,0.7);
            font-family: 'Lora', serif;
            font-style: italic;
        }

        ul {
            padding: 0;
            margin: 0;
            list-style: none;
            position: absolute;
            top: 0; right: 0; left: 0; bottom: 0;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            user-select: none;
            perspective-origin: center;
            perspective: 1000px;
        }

        li {
            position: absolute;
            top: 0; right: 0; left: 0; bottom: 0;
            width: 50%;
            height: 100%;
            backface-visibility: hidden;
            transform-style: preserve-3d;
            transform-origin: center left;
            transition: transform 0.8s cubic-bezier(0.645, 0.045, 0.355, 1.000);
        }

        li img {
            position: absolute;
            top: 0; right: 0; left: 0; bottom: 0;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            object-fit: contain;
            object-position: center left;
            transition: transform 0.8s cubic-bezier(0.645, 0.045, 0.355, 1.000);
        }

        li:nth-child(even) img { object-position: center right; }
        li.depth-0 img { transform: translateZ(0) scaleX(1); }
        li:nth-child(even) img { transform: translateZ(0) scaleX(-1); }
        li.depth-1 img { transform: translateZ(-2px) scaleX(1); }
        li.depth-1:nth-child(even) img { transform: translateZ(-2px) scaleX(-1); }
        li.depth-2 img { transform: translateZ(-4px) scaleX(1); }
        li.depth-2:nth-child(even) img { transform: translateZ(-4px) scaleX(-1); }

        #subscribe-bar {
            flex-shrink: 0;
            padding: 10px 16px 6px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        #subscribe-bar-2 {
            flex-shrink: 0;
            padding: 2px 16px 14px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: 100%;
        }

        #subscribe-bar a, #subscribe-bar-2 a {
            display: inline-block;
            background: linear-gradient(135deg, #ff66c4, #5170ff);
            color: #fff;
            text-decoration: none;
            padding: 12px 32px;
            border-radius: 10px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            position: relative;
            overflow: hidden;
        }

        #subscribe-bar a::after, #subscribe-bar-2 a::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 60%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
            animation: shimmer 2.5s infinite;
        }

        @keyframes shimmer {
            0%   { left: -100%; }
            100% { left: 200%; }
        }

        #subscribe-bar a:hover, #subscribe-bar-2 a:hover { opacity: 0.88; }

        #bottom-bar {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 6px 16px 0;
            width: 100%;
        }

        #hg-logo {
            height: 50px;
            width: auto;
        }

        #bottom-bar > a:not(#quiz-link) {
            display: inline-block;
            background: linear-gradient(135deg, #ff66c4, #5170ff);
            color: #fff;
            text-decoration: none;
            padding: 12px 32px;
            border-radius: 10px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            position: relative;
            overflow: hidden;
        }

        #bottom-bar > a:not(#quiz-link)::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 60%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
            animation: shimmer 2.5s infinite;
        }

        #bottom-bar > a:not(#quiz-link):hover { opacity: 0.88; }

        #quiz-link {
            display: inline-block;
            background: linear-gradient(135deg, #00e5ff, #00e676, #00e5ff);
            background-size: 200% 200%;
            animation: quizFlash 2s ease-in-out infinite, zineFloat 3s ease-in-out infinite;
            color: #000 !important;
            text-decoration: none;
            padding: 12px 32px;
            border-radius: 10px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            position: relative;
            overflow: hidden;
            filter: drop-shadow(0 0 8px rgba(0,229,118,0.8)) drop-shadow(0 0 18px rgba(0,229,255,0.5));
            margin-top: 10px;
        }

        @keyframes zineFloat {
            0%   { transform: translate(0px, 0px); }
            25%  { transform: translate(2px, -4px); }
            50%  { transform: translate(0px, -6px); }
            75%  { transform: translate(-2px, -4px); }
            100% { transform: translate(0px, 0px); }
        }

        @keyframes quizFlash {
            0%   { background-position: 0% 50%; opacity: 1; }
            50%  { background-position: 100% 50%; opacity: 0.75; }
            100% { background-position: 0% 50%; opacity: 1; }
        }

        #quiz-link:hover { opacity: 0.88; }

        #flip-btn {
            display: inline-block;
            background: transparent;
            color: #fff;
            border: none;
            cursor: pointer;
            padding: 12px 32px;
            border-radius: 10px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            position: relative;
            overflow: hidden;
            width: auto;
        }

        #flip-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 10px;
            padding: 2px;
            background: linear-gradient(135deg, #ff66c4, #5170ff, #ff66c4);
            background-size: 200% 200%;
            animation: borderShine 3s linear infinite;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        #flip-btn::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 60%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            animation: shimmer 2.5s infinite;
            pointer-events: none;
        }

        @keyframes borderShine {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #flip-btn:hover { opacity: 0.85; }

        #flip-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(0,0,0,0.92);
            align-items: center;
            justify-content: center;
        }

        #flip-overlay.active {
            display: flex;
        }

        #flip-overlay-text {
            font-family: 'Lora', serif;
            font-size: 22px;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            border-right: 2px solid rgba(255,255,255,0.8);
            width: 0;
            max-width: calc(100vw - 48px);
            margin: 0 auto;
        }

        #flip-overlay-text.typing {
            animation: flipTypewriter 1.8s steps(30) 0.2s forwards, blink 0.7s step-end infinite;
        }

        @keyframes flipTypewriter {
            from { width: 0; }
            to   { width: 25ch; }
        }

        @keyframes blink {
            50% { border-color: transparent; }
        }

        #cut-line {
            color: rgba(255,255,255,0.6);
            font-size: 16px;
            letter-spacing: 3px;
            user-select: none;
            width: 100%;
            text-align: center;
            margin-top: 8px;
        }

        .social-footer {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 18px;
            margin: 8px 0 0;
            width: 100%;
        }

        .social-footer a {
            width: 42px;
            height: 42px;
            min-width: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            color: white;
            text-decoration: none;
            background: linear-gradient(135deg, #5170ff, #ff66c4);
            transition: transform 0.2s ease, opacity 0.2s ease;
            flex-shrink: 0;
        }

        .social-footer a:hover { transform: translateY(-2px); opacity: 0.85; }

        .social-footer svg { width: 20px; height: 20px; }
    </style>

<body>

<canvas id="sparkle-canvas"></canvas>

<div id="wrapper">

            </a>

                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 3c.3 1.7 1.7 3 3.5 3.2v2.3c-1.4-.1-2.7-.6-3.5-1.3v7.6a5.5 5.5 0 11-5.5-5.5c.3 0 .6 0 .9.1v2.3a3.2 3.2 0 102.3 3.1V3h2.3z"/></svg>

            <a href="https://www.youtube.com/@365HockeyGirl" target="_blank" aria-label="YouTube">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M23 7s-.2-1.6-.8-2.3c-.7-.9-1.5-.9-1.9-1C17.7 3.5 12 3.5 12 3.5h0s-5.7 0-8.3.2c-.4 0-1.2.1-1.9 1C1.2 5.4 1 7 1 7S.8 8.9.8 10.7v1.6C.8 14 .9 15.9.9 15.9s.2 1.6.8 2.3c.7.9 1.6.9 2 .9 1.5.1 6.3.2 8.3.2s6.8 0 8.3-.2c.4 0 1.2-.1 1.9-1 .6-.7.8-2.3.8-2.3s.1-1.9.1-3.7v-1.6C23.2 8.9 23 7 23 7zM9.8 14.8V8.8l5.5 3-5.5 3z"/></svg>
            </a>

<script>
// ============================================================
// SETTINGS
// ============================================================
const TEMPLATE = 4;   // 1=8pg, 2=12pg, 3=14pg, 4=16pg, 5=24pg, 6=26pg, 7=32pg, 8=64pg
const ALT      = "What's Going On? A PWHL Rules Zine";
const SMOOTH   = false;

// ============================================================
// Zine reader
// ============================================================
const FOV = 45;
const REPO_BASE = 'https://raw.githubusercontent.com/nicoledan/unhinged/main/';
const ZINE_CONTAINER = document.querySelector('#zine-container');
let card_amount;
let current_state = 0;
let pages = [];
let activeFolder = 'pages';

document.body.ariaLabel = ALT;
document.body.style.imageRendering = SMOOTH ? 'auto' : 'pixelated';

function getTextures(folder) {
    const base = REPO_BASE + folder + '/';
    const inner = { 1:5, 2:9, 3:11, 4:13, 5:21, 6:23, 7:29, 8:61 }[TEMPLATE] || 5;
    card_amount  = { 1:4, 2:6, 3:7,  4:8,  5:12, 6:13, 7:16, 8:32 }[TEMPLATE] || 4;
    return [base + 'FRONT.png', base + 'INNERFRONT.png'].concat(
        new Array(inner).fill().map((_, i) => base + (i + 1) + '.png'),
        [base + 'BACK.png']
    );
}

function loadZine(folder) {
    ZINE_CONTAINER.innerHTML = '<div id="loading">loading zine...</div>';
    current_state = 0;
    pages = [];

    const textures = getTextures(folder);

    Promise.all(
        textures.map(src =>
            new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => resolve(img);
                img.onerror = reject;
                img.src = src;
                img.alt = src.split('/').pop().split('.')[0];
            })
        )
    )
    .then(imgs => {
        ZINE_CONTAINER.innerHTML = '';
        const list = document.createElement('ul');
        list.ariaHidden = true;
        pages = imgs.map((img, idx) => {
            const li = document.createElement('li');
            const flip = idx % 2;
            li.className = 'depth-' + Math.min(2, idx);
            li.style.transform = 'translateX(100%) rotateY(0deg) scaleZ(' + (flip ? -1 : 1) + ')';
            li.appendChild(img);
            list.appendChild(li);
            return li;
        });
        ZINE_CONTAINER.appendChild(list);

        function updatePerspective() {
            const w = ZINE_CONTAINER.offsetWidth;
            const h = ZINE_CONTAINER.offsetHeight;
            list.style.perspective = Math.sqrt(((w/2)*w)/2 + ((h/2)*h)/2) / Math.tan(((FOV/2)*Math.PI)/180) + 'px';
        }
        window.addEventListener('resize', updatePerspective);
        updatePerspective();

        activeFolder = folder;
        const btn = document.getElementById('flip-btn');
        btn.textContent = folder === 'pages' ? 'unfold & see the reverse ✨' : 'flip back to the front ✨';
        hideOverlay();
    })
    .catch(err => {
        console.error(err);
        ZINE_CONTAINER.innerHTML = '<div id="loading">Something went wrong! Make sure your images are in the pages folder.</div>';
    });
}

let lastReverse = 'blue'; // so first flip gives red

function handleFlip() {
    const overlay = document.getElementById('flip-overlay');
    const overlayText = document.getElementById('flip-overlay-text');

    overlay.classList.add('active');
    overlayText.classList.remove('typing');
    void overlayText.offsetWidth;
    overlayText.classList.add('typing');
    sparkleRush = true;
    sparkleCanvas.style.zIndex = 101;

    let next;
    if (activeFolder !== 'pages') {
        next = 'pages';
    } else {
        next = lastReverse === 'blue' ? 'pages-red' : 'pages-blue';
        lastReverse = next === 'pages-red' ? 'red' : 'blue';
    }

    setTimeout(() => {
        loadZine(next);
    }, 2200);
}

function hideOverlay() {
    const overlay = document.getElementById('flip-overlay');
    if (overlay) overlay.classList.remove('active');
    sparkleRush = false;
    sparkleCanvas.style.zIndex = 0;
}

// Initial load
loadZine('pages');

document.addEventListener('keyup', function(key) {
    if (key.key === 'ArrowLeft'  || key.key === 'a') flipLeft();
    else if (key.key === 'ArrowRight' || key.key === 'd') flipRight();
});

document.addEventListener('pointerup', function(event) {
    if (event.button !== 0) return;
    if (event.clientX < window.innerWidth / 2) flipRight();
    else flipLeft();
});

function getPages(state) {
    return [pages[state * 2], pages[state * 2 + 1]].filter(i => i);
}
function replaceTransformPerPage(state, search, replace) {
    getPages(state).forEach(page => { page.style.transform = page.style.transform.replace(search, replace); });
}
function setDepth(state, depth) {
    getPages(state).forEach(page => { page.className = page.className.replace(/depth-\d+/, 'depth-' + Math.min(depth, 2)); });
}
function flipLeft() {
    if (current_state >= card_amount) return;
    replaceTransformPerPage(current_state, '0deg', '-180deg');
    setDepth(current_state - 1, 1);
    setDepth(current_state - 2, 2);
    setDepth(current_state + 1, 0);
    setDepth(current_state + 2, 1);
    ++current_state;
}
function flipRight() {
    if (current_state <= 0) return;
    replaceTransformPerPage(current_state - 1, '-180deg', '0deg');
    setDepth(current_state - 3, 1);
    setDepth(current_state - 2, 0);
    setDepth(current_state + 1, 2);
    setDepth(current_state, 1);
    --current_state;
}

// ============================================================
// Sparkle animation
// ============================================================
const sparkleCanvas = document.getElementById('sparkle-canvas');
const sparkleCtx    = sparkleCanvas.getContext('2d');
let sparkles = [];
let sparkleRush = false;

function resizeCanvas() {
    sparkleCanvas.width  = window.innerWidth;
    sparkleCanvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function randomBetween(a, b) { return a + Math.random() * (b - a); }

function createSparkle(rush) {
    return {
        x: randomBetween(0, sparkleCanvas.width),
        y: rush ? sparkleCanvas.height + 10 : randomBetween(0, sparkleCanvas.height),
        size: rush ? randomBetween(4, 10) : randomBetween(2, 6),
        opacity: randomBetween(0.4, 1),
        speedY: rush ? randomBetween(-8, -20) : randomBetween(-0.4, -1.2),
        speedX: rush ? randomBetween(-1, 1) : randomBetween(-0.3, 0.3),
        twinkleSpeed: randomBetween(0.01, 0.03),
        twinkleDir: 1,
        shape: Math.random() > 0.5 ? 'star' : 'dot'
    };
}

for (let i = 0; i < 60; i++) sparkles.push(createSparkle(false));

function drawStar(x, y, size, opacity) {
    sparkleCtx.save();
    sparkleCtx.translate(x, y);
    sparkleCtx.globalAlpha = opacity;
    sparkleCtx.fillStyle = '#fff';
    sparkleCtx.beginPath();
    for (let i = 0; i < 4; i++) {
        const angle = (i / 4) * Math.PI * 2;
        const inner = size * 0.3;
        sparkleCtx.lineTo(Math.cos(angle) * size, Math.sin(angle) * size);
        sparkleCtx.lineTo(Math.cos(angle + Math.PI / 4) * inner, Math.sin(angle + Math.PI / 4) * inner);
    }
    sparkleCtx.closePath();
    sparkleCtx.fill();
    sparkleCtx.restore();
}

function animateSparkles() {
    sparkleCtx.clearRect(0, 0, sparkleCanvas.width, sparkleCanvas.height);

    if (sparkleRush && sparkles.length < 300) {
        for (let i = 0; i < 8; i++) sparkles.push(createSparkle(true));
    } else if (!sparkleRush && sparkles.length > 60) {
        sparkles = sparkles.slice(0, 60);
    }

    sparkles.forEach(s => {
        s.opacity += s.twinkleSpeed * s.twinkleDir;
        if (s.opacity >= 1 || s.opacity <= 0.1) s.twinkleDir *= -1;
        s.y += s.speedY;
        s.x += s.speedX;
        if (s.y < -10) {
            s.y = sparkleCanvas.height + 10;
            s.x = randomBetween(0, sparkleCanvas.width);
        }
        if (s.shape === 'star') {
            drawStar(s.x, s.y, s.size, s.opacity);
        } else {
            sparkleCtx.save();
            sparkleCtx.globalAlpha = s.opacity;
            sparkleCtx.fillStyle = '#fff';
            sparkleCtx.beginPath();
            sparkleCtx.arc(s.x, s.y, s.size / 2, 0, Math.PI * 2);
            sparkleCtx.fill();
            sparkleCtx.restore();
        }
    });
    requestAnimationFrame(animateSparkles);
}
animateSparkles();
</script>
</body>
